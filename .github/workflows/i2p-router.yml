name: I2P Router Test Harness

# NOTE: This workflow is the self-test / CI harness for this repository's
# router fixtures and the go-i2p/i2p-provider/.github/actions/i2p-router
# composite action. It is NOT meant to be consumed via `workflow_call` by
# other repositories that need a running router in their own test job.
#
# GitHub Actions jobs each run on an isolated runner/container, so a router
# process started in this workflow's "router" job cannot be reached from a
# job defined in a caller's workflow, even if that job depends on this one.
# Downstream consumers should instead add the composite action as a STEP in
# their own job, so the router keeps running for the rest of that job:
#
#   jobs:
#     test:
#       runs-on: ubuntu-latest
#       container:
#         image: ubuntu:24.04
#         options: --init
#       steps:
#         - uses: actions/checkout@v4
#         - uses: go-i2p/i2p-provider/.github/actions/i2p-router@main
#           with:
#             backend: go-i2p
#         - name: Run your tests
#           run: go test ./...
#         - uses: go-i2p/i2p-provider/.github/actions/i2p-router-stop@main
#           if: always()
#
# See README.md for full usage details.

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Router backend to start for integration tests
        required: false
        type: choice
        default: java
        options:
          - java
          - i2pd
          - emissary
          - go-i2p
  workflow_call:
    inputs:
      backend:
        description: Router backend to start for integration tests
        required: false
        type: string
        default: java

jobs:
  router:
    name: Start I2P router (${{ inputs.backend || 'java' }})
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --init
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start I2P router
        uses: ./.github/actions/i2p-router
        with:
          backend: ${{ inputs.backend || 'java' }}
          fixtures_ref: ${{ github.sha }}

      - name: Smoke router endpoints
        shell: bash
        run: |
          set -euo pipefail

          nc -z 127.0.0.1 "$I2P_ROUTER_I2CP_PORT"

          if [[ "${I2P_ROUTER_SAM_ENABLED}" == true ]]; then
            nc -z 127.0.0.1 "$I2P_ROUTER_SAM_TCP_PORT"
          fi

          if [[ "${I2P_ROUTER_I2PCONTROL_ENABLED}" == true ]]; then
            if [[ "${I2P_ROUTER_BACKEND}" == "java" ]]; then
              token=$(curl -fsS -H 'Content-Type: application/json' \
                -d '{"jsonrpc":"2.0","id":"1","method":"Authenticate","params":{"API":1,"Password":"itoopie"}}' \
                "$I2P_ROUTER_I2PCONTROL_URL" | jq -r '.result.Token')
              curl -fsS -H 'Content-Type: application/json' \
                -d "{\"jsonrpc\":\"2.0\",\"id\":\"2\",\"method\":\"RouterInfo\",\"params\":{\"Token\":\"$token\",\"i2p.router.version\":\"\",\"i2p.router.status\":\"\"}}" \
                "$I2P_ROUTER_I2PCONTROL_URL" | jq -e '.result'
            else
              token=$(curl -kfsS -H 'Content-Type: application/json' \
                -d '{"jsonrpc":"2.0","id":"1","method":"Authenticate","params":{"API":1,"Password":"itoopie"}}' \
                "$I2P_ROUTER_I2PCONTROL_URL" | jq -r '.result.Token')
              curl -kfsS -H 'Content-Type: application/json' \
                -d "{\"jsonrpc\":\"2.0\",\"id\":\"2\",\"method\":\"RouterInfo\",\"params\":{\"Token\":\"$token\",\"i2p.router.version\":\"\",\"i2p.router.status\":\"\"}}" \
                "$I2P_ROUTER_I2PCONTROL_URL" | jq -e '.result'
            fi
          fi

      - name: Run I2P application tests
        shell: bash
        run: |
          set -euo pipefail
          echo "Router backend: ${I2P_ROUTER_BACKEND}"
          echo "I2CP: ${I2P_ROUTER_I2CP_HOST}:${I2P_ROUTER_I2CP_PORT}"
          if [[ "${I2P_ROUTER_SAM_ENABLED}" == true ]]; then
            echo "SAM: ${I2P_ROUTER_SAM_HOST}:${I2P_ROUTER_SAM_TCP_PORT} (UDP ${I2P_ROUTER_SAM_UDP_PORT})"
          else
            echo "SAM: disabled for this backend"
          fi
          if [[ "${I2P_ROUTER_I2PCONTROL_ENABLED}" == true ]]; then
            echo "I2PControl: ${I2P_ROUTER_I2PCONTROL_URL}"
          else
            echo "I2PControl: disabled for this backend"
          fi
          echo "Insert I2P client tests for your application here."

      - name: Stop I2P router
        if: always()
        uses: ./.github/actions/i2p-router-stop

  endpoint-tests:
    name: Endpoint smoke test (${{ matrix.endpoint }})
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --init
    strategy:
      fail-fast: false
      matrix:
        endpoint:
          - i2cp
          - sam
          - i2pcontrol
    env:
      ENDPOINT: ${{ matrix.endpoint }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start I2P router
        uses: ./.github/actions/i2p-router
        with:
          backend: ${{ inputs.backend || 'java' }}
          fixtures_ref: ${{ github.sha }}

      - name: Test selected endpoint
        shell: bash
        run: |
          set -euo pipefail

          case "$ENDPOINT" in
            i2cp)
              nc -z 127.0.0.1 "$I2P_ROUTER_I2CP_PORT"
              ;;
            sam)
              if [[ "${I2P_ROUTER_SAM_ENABLED}" != true ]]; then
                echo "SAM is disabled for backend ${I2P_ROUTER_BACKEND}" >&2
                exit 1
              fi
              nc -z 127.0.0.1 "$I2P_ROUTER_SAM_TCP_PORT"
              ;;
            i2pcontrol)
              if [[ "${I2P_ROUTER_I2PCONTROL_ENABLED}" != true ]]; then
                echo "I2PControl is not exposed for backend ${I2P_ROUTER_BACKEND}; skipping"
                exit 0
              fi

              if [[ "${I2P_ROUTER_BACKEND}" == "java" ]]; then
                token=$(curl -fsS -H 'Content-Type: application/json' \
                  -d '{"jsonrpc":"2.0","id":"1","method":"Authenticate","params":{"API":1,"Password":"itoopie"}}' \
                  "$I2P_ROUTER_I2PCONTROL_URL" | jq -r '.result.Token')
                curl -fsS -H 'Content-Type: application/json' \
                  -d "{\"jsonrpc\":\"2.0\",\"id\":\"2\",\"method\":\"RouterInfo\",\"params\":{\"Token\":\"$token\",\"i2p.router.version\":\"\",\"i2p.router.status\":\"\"}}" \
                  "$I2P_ROUTER_I2PCONTROL_URL" | jq -e '.result'
              else
                token=$(curl -kfsS -H 'Content-Type: application/json' \
                  -d '{"jsonrpc":"2.0","id":"1","method":"Authenticate","params":{"API":1,"Password":"itoopie"}}' \
                  "$I2P_ROUTER_I2PCONTROL_URL" | jq -r '.result.Token')
                curl -kfsS -H 'Content-Type: application/json' \
                  -d "{\"jsonrpc\":\"2.0\",\"id\":\"2\",\"method\":\"RouterInfo\",\"params\":{\"Token\":\"$token\",\"i2p.router.version\":\"\",\"i2p.router.status\":\"\"}}" \
                  "$I2P_ROUTER_I2PCONTROL_URL" | jq -e '.result'
              fi
              ;;
            *)
              echo "Unknown endpoint: $ENDPOINT" >&2
              exit 1
              ;;
          esac

      - name: Stop I2P router
        if: always()
        uses: ./.github/actions/i2p-router-stop
